<path class="w-amber" d="M996,192 V436 H604" marker-end="url(#arrA)"/><text class="flow-lbl" fill="#FFB224" x="700" y="454">proposed actions (no effect yet)</text>
<rect class="box" x="672" y="500" width="232" height="76" rx="10"/><text class="box-title" x="690" y="530">OPERATOR DASHBOARD</text><text class="box-sub" x="690" y="548">React / Vite · approval queue</text><text class="box-sub" x="690" y="564">site views</text><circle cx="928" cy="524" r="9" fill="none" stroke="#E6EDF3" stroke-width="1.75"/><path d="M913,552 q15,-16 30,0" fill="none" stroke="#E6EDF3" stroke-width="1.75"/><text class="lbl" x="950" y="542">HUMAN</text>
<path class="w-amber" d="M520,476 V538 H668" marker-end="url(#arrA)"/><text class="flow-lbl" fill="#FFB224" x="534" y="530">approval queue</text>
<path class="w-red" d="M672,556 H300 V216 H332" marker-end="url(#arrR)"/><rect x="286" y="356" width="28" height="60" fill="#10171F"/><line x1="300" y1="416" x2="326" y2="374" stroke="#FFB224" stroke-width="2.5" stroke-linecap="round"/><circle cx="300" cy="416" r="3.5" fill="#FFB224"/><circle cx="300" cy="356" r="3.5" fill="#FFB224"/><text class="flow-lbl" fill="#FFB224" x="288" y="380" text-anchor="end">APPROVAL GATE</text><text class="flow-lbl" fill="#5C6B7A" x="288" y="395" text-anchor="end">normally open</text><path class="w-red" d="M336,176 H264" marker-end="url(#arrR)"/><text class="flow-lbl" fill="#E5484D" x="380" y="572">approved command</text>
