<text class="lbl" x="40" y="76">FIELD · NIGERIAN C&amp;I SITES</text>
<rect class="box" x="40" y="92" width="176" height="56" rx="10"/><text class="box-title" x="58" y="116">GENSETS</text><text class="box-sub" x="58" y="134">start/stop · setpoints</text>
<rect class="box" x="40" y="168" width="176" height="56" rx="10"/><text class="box-title" x="58" y="192">INVERTERS</text><text class="box-sub" x="58" y="210">modes · limits</text>
