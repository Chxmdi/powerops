<svg viewBox="0 0 1120 640" role="img" aria-labelledby="schemTitle schemDesc" xmlns="http://www.w3.org/2000/svg">
<title id="schemTitle">PowerOps one-line architecture diagram</title>
<desc id="schemDesc">Field devices connect over Modbus to a control plane built on Express. Telemetry flows into PostgreSQL and is exposed to an LLM agent through an MCP server. The agent writes proposals into an approval queue reviewed by a human operator in a React dashboard. A normally-open approval gate sits between proposals and execution; only approved commands flow back through the control plane to devices. Prometheus and Grafana observe the whole loop.</desc>
<defs>
<marker id="arrB" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#4E76E5"/></marker>
<marker id="arrA" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#FFB224"/></marker>
<marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#E5484D"/></marker>
</defs>
<style>
