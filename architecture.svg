<line x1="260" y1="92" x2="260" y2="300" stroke="#93A4B4" stroke-width="3"/><text class="lbl" x="252" y="326" text-anchor="middle">MODBUS</text><line class="w-blue" x1="216" y1="120" x2="258" y2="120"/><line class="w-blue" x1="216" y1="196" x2="258" y2="196"/><line class="w-blue" x1="216" y1="272" x2="258" y2="272"/>
